<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gantt Chart Example</title>
    <style>
        /* Add your custom CSS styles here */
    </style>
</head>
<body>
    <div id="chart"></div>

    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script>
        // Example dataset
        const events = [
            { name: "Federal Troops Sent", start: new Date(1794, 6, 16), end: new Date(1794, 6, 30) },
            { name: "Rebellion Suppressed", start: new Date(1794, 7, 1), end: new Date(1794, 7, 14) },
            { name: "Whiskey Rebellion Ends", start: new Date(1794, 7, 15), end: new Date(1794, 7, 31) },
            { name: "Impact on Tax Collection", start: new Date(1794, 8, 1), end: new Date(1794, 8, 15) },
            { name: "Legacy of the Rebellion", start: new Date(1794, 8, 16), end: new Date(1794, 8, 30) }
        ];

        // Set up the chart dimensions
        const margin = { top: 20, right: 30, bottom: 30, left: 60 };
        const width = 800 - margin.left - margin.right;
        const height = 200 - margin.top - margin.bottom;

        // Create the SVG container
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // Set up the scales
        const xScale = d3.scaleTime()
            .domain([d3.min(events, d => d.start), d3.max(events, d => d.end)])
            .range([0, width]);

        const yScale = d3.scaleBand()
            .domain(events.map(d => d.name))
            .range([0, height])
            .padding(0.1);

        // Draw the bars
        svg.selectAll("rect")
            .data(events)
            .enter()
            .append("rect")
            .attr("x", d => xScale(d.start))
            .attr("y", d => yScale(d.name))
            .attr("width", d => xScale(d.end) - xScale(d.start))
            .attr("height", yScale.bandwidth())
            .attr("fill", "lightblue");

        // Draw the labels
        svg.selectAll("text")
            .data(events)
            .enter()
            .append("text")
            .attr("x", d => xScale(d.start) + 5)
            .attr("y", d => yScale(d.name) + yScale.bandwidth() / 2)
            .text(d => d.name)
            .attr("fill", "black")
            .attr("font-size", "12px")
            .attr("alignment-baseline", "middle");

        // Draw the x-axis
        const xAxis = d3.axisBottom(xScale);
        svg.append("g")
            .attr("transform", `translate(0, ${height})`)
            .call(xAxis);
    </script>
</body>
</html>
