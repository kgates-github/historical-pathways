        // Set up the chart dimensions
        const margin = { top: 20, right: 30, bottom: 30, left: 400 };
        const width = 1400 - margin.left - margin.right;
        const height = 1200 - margin.top - margin.bottom;

        // Create the SVG container
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // Set up the scales
        const xScale = d3.scaleTime()
            .domain([d3.min(data, d => d.start), d3.max(data, d => d.end)])
            .range([0, width]);

        const yScale = d3.scaleBand()
            .domain(data.map(d => d.name))
            .range([0, height])
            .padding(0.1);

        // Draw the bars
        svg.selectAll("rect")
            .data(data)
            .enter()
            .append("rect")
            .attr("x", d => xScale(d.start) + 10)
            .attr("y", d => yScale(d.name) + yScale.bandwidth()/2 - 2)
            .attr("width", d => xScale(d.end) - xScale(d.start) + 10)
            .attr("height", yScale.bandwidth() / 5 + 1)
            .attr("fill", (d) => {
                //return "white"
                const type = d.type.toLowerCase();
                console.log(type)
                if (type === "event") {
                    return "green";
                } else if (type === "section") {
                    return "#555";
                } else if (type === "effect") {
                    return "orange";
                } else if (type === "cause") {
                    return "blue";
                } else if (type === "deep dive") {
                    return "green";
                } else if (type === "broad perspective") {
                    return "yellow";
                }
                return "#ff0000"
            })

        // Draw the labels
        svg.selectAll("text")
            .data(data)
            .enter()
            .append("text")
            .attr("x", d => xScale(d.start) - 5)
            .attr("y", d => yScale(d.name) + yScale.bandwidth() / 2)
            .text(d => d.name +" (" + d.type + ")")
            .attr("fill", "#999")
            .attr("font-size", "12px")
            .attr("font-family", "sans-serif")
            .attr("font-weight", "light")
            .attr("text-anchor", "end")
            .attr("alignment-baseline", "middle");

        
        // Draw the x-axis
        const xAxis = d3.axisBottom(xScale);
        svg.append("g")
            .attr("transform", `translate(0, ${height})`)
            .call(xAxis)
            .selectAll("text")
            .attr("fill", "#fff")
            
            ;
    </script>
