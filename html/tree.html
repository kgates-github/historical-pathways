<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tree Chart Example</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
  
    /* CSS */
    .link {
      fill: none;
      stroke-width: 1; /* Edge thickness */
    }

    .node {
      fill: #cc0000; /* Node background color */
    }

    .text {
      font: 14px Source Sans Pro, sans-serif; 
      cursor:  pointer;
      font-weight: Light
    }

    html, body {
      font: 14px Source Sans Pro, sans-serif; 
      font-weight: 400;
      line-height: 1.4em;
      height: 100%;
      margin: 0;
      padding: 10px 40px 10px 40px;
      background: #fff;
    }
  </style>
  <script src="js/tree.js"></script>
</head>
<body>
  <div id="menu"></div>
  <svg id="chart" width="1300" height="500"></svg>
  <div id="content" style="display:flex; flex-direction: row; width:1300px; margin-top:40px;"></div>

  <script>
    // Set up the tree layout
    const treeLayout = d3.tree().size([500, 1050]);

    // Create a hierarchy from the data
    const root = d3.hierarchy(data[0]);

    // Compute the tree layout
    treeLayout(root);

    // Create an SVG container
    const svg = d3.select("#chart");

    // Function to update the tree with new data
    function updateTree(selectedData) {
      // Update the hierarchy with the selected data
      const updatedRoot = d3.hierarchy(selectedData);

      // Compute the tree layout for the updated data
      treeLayout(updatedRoot);

      // Update links between nodes
      svg.selectAll("path")
        .data(updatedRoot.links())
        .join("path")
        .attr('class', 'link')
        .attr("stroke", d => d.target.data.visited == "true" ? "#000" : "#333")
        .attr("opacity", d => d.target.data.visited == "true" ? 0.3 : 0.1)
        .attr("d", d3.linkHorizontal()
          .x(d => d.y)
          .y(d => d.x));

      // Update nodes
      svg.selectAll("circle")
        .data(updatedRoot.descendants())
        .join("circle")
        //.attr('class', 'node')
        .attr("cx", d => d.y)
        .attr("cy", d => d.x)
        .attr("fill", d => d.data.visited == "true" ? "#000" : "#333")
        .attr("opacity", d => d.data.visited == "true" ? 0 : 0)
        .attr("r", 3);

      // Update labels for nodes
      svg.selectAll("text")
        .data(updatedRoot.descendants())
        .join("text")
        .attr('class', 'text')
        .attr("x", d => d.y + 10)
        .attr("y", d => d.x + 4)
        .attr("fill", d => d.data.visited == "true" ? "#000" : "#333")
        .style("font-weight", d => d.data.visited == "true" ? 700 : 400)
        .attr("opacity", d => d.data.visited == "true" ? 1 : 0.5)
        .text(d => d.data.name);
    }

    // Function to create divs for visited nodes
    function createDivs(selectedData) {
      // Parse the selected data and get nodes where visited="true"
      function getVisitedNodes(data) {
        const visitedNodes = [];

        function traverse(node) {
          if (node.visited === "true") {
            visitedNodes.push(node);
          }

          if (node.children) {
            node.children.forEach(child => {
              traverse(child);
            });
          }
        }

        traverse(data);

        return visitedNodes;
      }

      const colorScale = d3.scaleOrdinal(d3.schemeCategory10);

      function createThemeSpan(themes) {
        
        let themesString = "";
        themes.forEach(theme => {
          const color = colorScale(theme);
          themesString += "<div style='color:#fff; background-color:" + color + 
          "; padding:0px 6px 0px 6px; border-radius:8px; margin-bottom:4px;'>" + theme + "</div>";
        });
        
        return themesString
      }

      function createPeopleSpan(people) {
        
        let themesString = "";
        people.forEach(person => {
          const color = colorScale(person);
          themesString += "<div style='color:#fff; background-color:" + color + 
          "; padding:0px 6px 0px 6px; border-radius:8px; margin-bottom:4px;'>" + person.name + ": " + person.description + "</div>";
        });
        
        return themesString
      }

      const visitedNodes = getVisitedNodes(selectedData);

      // Select the content div and remove its contents
      let content = d3.select("#content")
      content.html("");

      visitedNodes.forEach(n => {
        content
          .append("div")
          .style("padding-right", "40px")
          .style("flex", "1")
          .html("<div style='margin-bottom:16px; font-weight:500'>" + n.content.dates["start"] + " - " + n.content.dates["end"] + "</div>" +
              "<div style='margin-bottom:16px;'>DESCRIPTION: " + n.content.description + "</div>" + 
              "<div style='margin-bottom:16px;'>INTRODUCTION: " + n.content.introduction + "</div>" + 
              "<div style='margin-bottom:16px;'>CONCLUSION: " + n.content.conclusion + "</div>" + 
              "</div><div style='margin-bottom:16px;'>THEMES</div><div style='margin-bottom:16px;'>" + createThemeSpan(n.content.themes) + "</div>" +
              "</div><div style='margin-bottom:16px;'>PEOPLE</div><div style='margin-bottom:16px;'>" + createPeopleSpan(n.content.people) + "</div>" +
              "</div><div style='margin-bottom:16px;'>PLACES</div><div style='margin-bottom:16px;'>" + createThemeSpan(n.content.places) + "</div>"
          )
      });
      content.append("div")
        .style("padding", "0px")
        .style("flex", "1")
        .html(" ")

      }
      

    // Create the select menu
    const selectMenu = d3.select("#menu")
      .append("select")
      .on("change", function() {
        const selectedIndex = this.selectedIndex;
        const selectedData = data[selectedIndex];
        updateTree(selectedData);
        createDivs(selectedData);
      });

    // Add options to the select menu
    selectMenu.selectAll("option")
      .data(data)
      .enter()
      .append("option")
      .text(d => d.name + d.menu);

    // Set the default selected option
    selectMenu.property("value", data[0].name);

    // Initialize the tree with default data
    updateTree(data[0]);
    createDivs(data[0]);
  </script>
